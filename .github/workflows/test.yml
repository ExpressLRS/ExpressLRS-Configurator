name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ['ubuntu-22.04', 'windows-2022', 'macos-latest']

    steps:
      - name: Setup apt dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt-get install --no-install-recommends -y libarchive-tools rpm

      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Install Node, NPM and Yarn
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # required for node gyp / serialport module
      - run: pip install setuptools

      - name: Install dependencies
        run: |
          yarn install --network-timeout 180000

      - name: yarn lint
        run: |
          yarn lint

      - name: yarn typecheck
        run: |
          yarn typecheck

      - name: yarn test
        run: |
          yarn test

      - name: yarn package
        run: |
          yarn package

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.deb
            release/*.rpm
            release/*.pacman
            release/*.zip
          if-no-files-found: ignore

  comment-artifacts:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post artifact links
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: context.runId,
            });

            const lines = artifacts.map(a => {
              const url = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}/artifacts/${a.id}`;
              return `- [${a.name}](${url}) (${(a.size_in_bytes / 1024 / 1024).toFixed(1)} MB)`;
            });

            const body = `### 📦 Build artifacts\n\n${lines.join('\n')}\n\n[View workflow run](${runUrl})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('### 📦 Build artifacts'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body });
            }
