name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ['ubuntu-22.04', 'windows-2022', 'macos-latest']

    steps:
      - name: Setup apt dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt-get install --no-install-recommends -y libarchive-tools rpm

      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Install Node, NPM and Yarn
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # required for node gyp / serialport module
      - run: pip install setuptools

      - name: Install dependencies
        run: |
          yarn install --network-timeout 180000

      - name: yarn lint
        run: |
          yarn lint

      - name: yarn package
        run: |
          yarn package

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.deb
            release/*.rpm
            release/*.pacman
            release/*.zip
          if-no-files-found: ignore

      - name: yarn test
        run: |
          yarn test

  comment-artifacts:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post artifact links
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `### 📦 Build artifacts\n\nDownload the build artifacts for this PR from the [workflow run](${runUrl}):\n- **build-ubuntu-22.04** — Linux (.deb, .rpm, .pacman, .zip)\n- **build-windows-2022** — Windows (.exe)\n- **build-macos-latest** — macOS (.dmg)`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('### 📦 Build artifacts'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
