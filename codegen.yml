overwrite: true
schema: 'http://localhost:3500/graphql'
generates:
  src/ui/gql/generated/types.ts:
    documents:
      - './src/ui/**/*.graphql'
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typed-document-node'
    config:
      immutableTypes: true
      namingConvention:
        enumValues: 'keep'

  graphql.schema.json:
    plugins:
      - 'introspection'
